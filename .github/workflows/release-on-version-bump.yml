# 当 push 到 main 且本提交的 package.json version 比上一提交更新时，自动：测试 → 构建 → 发布
name: 版本号变更时自动发布

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  packages: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 检查版本是否比上一提交更新
        id: check
        run: |
          current=$(node -p "require('./package.json').version")
          echo "version=$current" >> "$GITHUB_OUTPUT"

          git show HEAD~1:package.json > /tmp/old-package.json 2>/dev/null || true
          if [[ -s /tmp/old-package.json ]]; then
            previous=$(node -p "try { require('/tmp/old-package.json').version } catch(e) { '0.0.0' }" 2>/dev/null) || previous="0.0.0"
          else
            previous="0.0.0"
          fi

          should_release=$(node -e "
            const parse = v => (v || '0.0.0').split('.').map(x => parseInt(x) || 0);
            const a = parse(process.argv[1]), b = parse(process.argv[2]);
            const len = Math.max(a.length, b.length);
            for (let i = 0; i < len; i++) {
              const av = a[i] || 0, bv = b[i] || 0;
              if (av > bv) { console.log('true'); process.exit(0); }
              if (av < bv) break;
            }
            console.log('false');
          " "$current" "$previous")

          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"

          if [[ "$should_release" == "true" ]]; then
            echo "当前提交版本: $current > 上一提交: $previous，触发发布"
          else
            echo "当前 $current 未高于上一提交 $previous，跳过发布"
          fi

  test:
    needs: [check-version]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: 设置 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.29.3"

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 运行测试
        run: pnpm test

  build:
    needs: [check-version, test]
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: 设置 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.29.3"

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建可执行文件
        run: pnpm run package:sea

      - name: 制作压缩包（Win）
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $os = "${{ runner.os }}".ToLowerInvariant()
          $arch = "${{ runner.arch }}".ToLowerInvariant()
          $name = "phira-mp-$os-$arch.zip"
          if (Test-Path $name) { Remove-Item $name -Force }
          Compress-Archive -Path release\* -DestinationPath $name

      - name: 制作压缩包（Linux/macOS）
        if: runner.os != 'Windows'
        shell: bash
        run: |
          os="$(printf "%s" "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')"
          arch="$(printf "%s" "${{ runner.arch }}" | tr '[:upper:]' '[:lower:]')"
          name="phira-mp-${os}-${arch}.zip"
          rm -f "$name"
          (cd release && zip -r "../$name" .)

      - name: 上传压缩包
        uses: actions/upload-artifact@v4
        with:
          name: phira-mp-${{ runner.os }}-${{ runner.arch }}
          path: |
            phira-mp-*.zip

  release:
    if: startsWith(github.ref, 'refs/tags/') || needs.check-version.outputs.should_release == 'true'
    needs: [check-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 下载压缩包
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 生成自定义 Release Notes
        id: notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 获取当前版本
          CURRENT_VERSION="${{ needs.check-version.outputs.version }}"
          echo "当前版本: v${CURRENT_VERSION}"
          
          # 从 GitHub Releases 获取最新的已发布版本号
          PREVIOUS_VERSION=$(gh release list --limit 100 --json tagName,isPrerelease \
            --jq '[.[] | select(.isPrerelease == false) | .tagName] | .[0]' 2>/dev/null || echo "")
          
          if [ -z "$PREVIOUS_VERSION" ]; then
            echo "未找到上一个 release，读取所有提交"
            COMMITS=$(git log --pretty=format:"%s")
          else
            echo "找到上一个 release 版本: ${PREVIOUS_VERSION}"
            
            # 获取远程 tags
            git fetch --tags origin
            
            # 验证远程 tag 是否存在
            if git rev-parse "refs/tags/${PREVIOUS_VERSION}" >/dev/null 2>&1; then
              echo "从远程 tag ${PREVIOUS_VERSION} 到 HEAD 对比提交"
              COMMITS=$(git log ${PREVIOUS_VERSION}..HEAD --pretty=format:"%s")
            else
              echo "警告: 远程 tag ${PREVIOUS_VERSION} 不存在，读取所有提交"
              COMMITS=$(git log --pretty=format:"%s")
            fi
          fi
          
          echo "提交列表：$COMMITS"
          
          # 初始化分类
          FEATURES=""
          FIXES=""
          IMPROVEMENTS=""
          OTHERS=""
          
          # 分类处理每个 commit
          while IFS= read -r line; do
            # 跳过空行
            [[ -z "$line" ]] && continue
            
            if [[ $line =~ ^feat(\(.*\))?:\ (.*) ]]; then
              FEATURES+="* ${BASH_REMATCH[2]}"$'\n'
            elif [[ $line =~ ^fix(\(.*\))?:\ (.*) ]]; then
              FIXES+="* ${BASH_REMATCH[2]}"$'\n'
            elif [[ $line =~ ^(perf|refactor|improvement|chore)(\(.*\))?:\ (.*) ]]; then
              IMPROVEMENTS+="* ${BASH_REMATCH[3]}"$'\n'
            elif [[ ! $line =~ ^(docs|test|ci)(\(.*\))?:\ (.*) ]]; then
              # 不忽略任何其他格式的提交，只忽略 docs/test/ci
              if [[ ! -z "$line" ]]; then
                OTHERS+="* $line"$'\n'
              fi
            fi
          done <<< "$COMMITS"
          
          # 生成 Release Notes
          NOTES="## 更新"$'\n'
          
          if [ -n "$FEATURES" ]; then
            NOTES+="### ✨ 新增"$'\n'
            NOTES+="$FEATURES"
          fi
          
          if [ -n "$FIXES" ]; then
            NOTES+="### 🐛 修复"$'\n'
            NOTES+="$FIXES"
          fi
          
          if [ -n "$IMPROVEMENTS" ]; then
            NOTES+="### 🔄 改进"$'\n'
            NOTES+="$IMPROVEMENTS"
          fi
          
          if [ -n "$OTHERS" ]; then
            NOTES+="### 📝 其他"$'\n'
            NOTES+="$OTHERS"
          fi
          
          NOTES+="***"$'\n'
          NOTES+="完整更新日志"
          
          echo "release_notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 列出 artifacts 目录结构
        shell: bash
        run: find artifacts -type f -name "*.zip" | head -20

      - name: 发布到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          files: |
            artifacts/phira-mp-Linux-ARM64/*.zip
            artifacts/phira-mp-Linux-X64/*.zip
            artifacts/phira-mp-Windows-X64/*.zip
            artifacts/phira-mp-macOS-ARM64/*.zip
          body: ${{ steps.notes.outputs.release_notes }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    if: startsWith(github.ref, 'refs/tags/') || needs.check-version.outputs.should_release == 'true'
    needs: [check-version, release]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 生成镜像标签
        id: meta
        shell: bash
        env:
          REPOSITORY: ${{ github.repository }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          repo_lc="${REPOSITORY,,}"
          image="ghcr.io/${repo_lc}"
          version_tag="v${VERSION,,}"
          if [[ "$version_tag" =~ ^v([0-9]+)\.([0-9]+)\.0$ ]]; then
            version_tag="v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
          fi
          tags="${image}:${version_tag},${image}:latest"
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"
          echo "version=${version_tag}" >> "$GITHUB_OUTPUT"

      - name: 构建并推送
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          target: runtime-sea
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            PHIRA_MP_VERSION=${{ steps.meta.outputs.version }}
          pull: true
          no-cache: true

      - name: 清理构建缓存
        if: always()
        shell: bash
        run: |
          docker builder prune -af || true
          docker system prune -af || true
